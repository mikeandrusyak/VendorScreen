name: Deploy to monday code

on:
  push:
    branches: [main]

# Prevent overlapping deploys if commits land in quick succession.
concurrency:
  group: deploy-monday
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: Tests (pytest)
        run: pytest -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    env:
      APP_ID: ${{ vars.MONDAY_APP_ID }}
      # App lives in the euc1 region (see .mappsrc token). Override with a
      # MONDAY_REGION repo variable if the app is moved (us|eu|au|il).
      REGION: ${{ vars.MONDAY_REGION || 'eu' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install monday apps CLI
        run: npm install -g @mondaycom/apps-cli

      # The CLI reads its token from a local .mappsrc file (no env-var support),
      # so we generate one from the MONDAY_TOKEN secret before any command.
      - name: Authenticate monday CLI
        run: mapps init -t "$MONDAY_TOKEN" -l
        env:
          MONDAY_TOKEN: ${{ secrets.MONDAY_TOKEN }}

      # monday deploys code into the app's latest DRAFT version. After a version
      # is promoted to live, no draft remains and there is nothing to deploy
      # into. Detect that up front and fail with an actionable message instead
      # of the CLI's opaque error. (The CLI has no --json output, so we match
      # the human-readable list; the deploy step below is the reliable backstop.)
      - name: Check that a draft version exists
        run: |
          set +e
          VERSIONS=$(mapps app-version:list -i "$APP_ID" 2>&1)
          STATUS=$?
          echo "$VERSIONS"
          if [ $STATUS -eq 0 ] && ! echo "$VERSIONS" | grep -qi "draft"; then
            echo "::error title=No draft version::This app has no draft version to deploy into."
            echo "monday code always deploys into the latest DRAFT version. Once a version is promoted to live, no draft is left, so the deploy has nowhere to go."
            echo "Fix: open the monday Developer Center -> your app -> Versions -> 'Create new version' (it starts as a draft), then re-run this workflow."
            exit 1
          fi

      - name: Deploy to the latest draft version
        run: |
          set +e
          OUTPUT=$(mapps code:push -a "$APP_ID" -z "$REGION" 2>&1)
          STATUS=$?
          echo "$OUTPUT"
          if [ $STATUS -ne 0 ]; then
            echo "::error title=Deploy failed::Pushing code to monday failed."
            if echo "$OUTPUT" | grep -qi "draft"; then
              echo "Likely cause: no draft version exists. Create a new version in the monday Developer Center (it starts as a draft), then re-run."
            else
              echo "Check that MONDAY_TOKEN is valid and not expired, MONDAY_APP_ID ($APP_ID) is correct, and the region ($REGION) matches your app."
            fi
            exit 1
          fi
          echo "Deployed successfully to the latest draft version. Promote it to live in the monday Developer Center when ready."
